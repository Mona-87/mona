<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园学习资源共享平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(90deg, #4a90e2, #6cb2eb);
            color: white;
            padding: 20px 0;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
        }
        
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: fit-content;
        }
        
        .upload-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .resource-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        
        .resource-card:hover {
            transform: translateY(-5px);
        }
        
        .resource-type {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-bottom: 10px;
        }
        
        .notes { background: #e3f2fd; color: #1976d2; }
        .exams { background: #f3e5f5; color: #7b1fa2; }
        .tips { background: #e8f5e8; color: #388e3c; }
        
        .resource-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .resource-desc {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .resource-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: #888;
        }
        
        .download-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .download-btn:hover {
            background: #357abd;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        
        textarea {
            height: 100px;
            resize: vertical;
        }
        
        button {
            background: linear-gradient(90deg, #4a90e2, #6cb2eb);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s ease;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .nav-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .nav-item:hover {
            color: #4a90e2;
        }
        
        .search-bar {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 校园学习资源共享平台</h1>
            <p class="subtitle">知识共享，互助成长</p>
        </header>
        
        <div class="main-content">
            <aside class="sidebar">
                <h3>导航菜单</h3>
                <div class="nav-item">全部资源</div>
                <div class="nav-item">课程笔记</div>
                <div class="nav-item">往年试题</div>
                <div class="nav-item">学习心得</div>
                <div class="nav-item">选课攻略</div>
                
                <h3 style="margin-top: 20px;">搜索资源</h3>
                <input type="text" class="search-bar" placeholder="输入关键词搜索...">
                
                <h3 style="margin-top: 20px;">热门课程</h3>
                <div class="nav-item">高等数学</div>
                <div class="nav-item">大学物理</div>
                <div class="nav-item">英语四级</div>
                <div class="nav-item">计算机基础</div>
            </aside>
            
            <main>
                <section class="upload-section">
                    <h2>📤 上传学习资源</h2>
                    <form id="uploadForm">
                        <div class="form-group">
                            <label for="resourceType">资源类型</label>
                            <select id="resourceType">
                                <option value="notes">课程笔记</option>
                                <option value="exams">往年试题</option>
                                <option value="tips">学习心得</option>
                                <option value="course">选课攻略</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="courseName">课程名称</label>
                            <input type="text" id="courseName" placeholder="请输入课程名称">
                        </div>
                        
                        <div class="form-group">
                            <label for="resourceTitle">资源标题</label>
                            <input type="text" id="resourceTitle" placeholder="请输入资源标题">
                        </div>
                        
                        <div class="form-group">
                            <label for="description">资源描述</label>
                            <textarea id="description" placeholder="简要描述资源内容..."></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="fileUpload">选择文件</label>
                            <input type="file" id="fileUpload">
                        </div>
                        
                        <button type="submit">上传资源</button>
                    </form>
                </section>
                
                <section>
                    <h2>📚 最新共享资源</h2>
                    <div class="resources-grid" id="resourcesContainer">
                        <!-- 资源卡片将通过JavaScript动态生成 -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        // 示例资源数据
        const resources = [
            {
                id: 1,
                type: 'notes',
                title: '高等数学A上册笔记',
                description: '涵盖极限、导数、积分等内容，重点突出，适合期末复习',
                course: '高等数学A',
                uploader: '张同学',
                date: '2024-01-15',
                downloads: 156
            },
            {
                id: 2,
                type: 'exams',
                title: '2023年高数A期末考试题',
                description: '包含详细解答过程，历年真题参考价值高',
                course: '高等数学A',
                uploader: '李同学',
                date: '2024-01-10',
                downloads: 203
            },
            {
                id: 3,
                type: 'tips',
                title: '英语六级备考经验',
                description: '个人备考心得，包含时间规划、技巧总结',
                course: '大学英语',
                uploader: '王同学',
                date: '2024-01-12',
                downloads: 89
            },
            {
                id: 4,
                type: 'course',
                title: '计算机专业选课指南',
                description: '大二选课建议，课程难度分析及先修关系',
                course: '计算机科学',
                uploader: '赵同学',
                date: '2024-01-08',
                downloads: 142
            },
            {
                id: 5,
                type: 'notes',
                title: '线性代数知识点总结',
                description: '矩阵运算、特征值等核心概念梳理',
                course: '线性代数',
                uploader: '陈同学',
                date: '2024-01-14',
                downloads: 112
            },
            {
                id: 6,
                type: 'exams',
                title: 'C++程序设计期中测试',
                description: '编程题目为主，附带标准答案',
                course: 'C++程序设计',
                uploader: '刘同学',
                date: '2024-01-11',
                downloads: 76
            }
        ];

        // 渲染资源卡片
        function renderResources(resourcesList) {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';
            
            resourcesList.forEach(resource => {
                const card = document.createElement('div');
                card.className = 'resource-card';
                
                let typeClass, typeText;
                switch(resource.type) {
                    case 'notes':
                        typeClass = 'notes';
                        typeText = '课程笔记';
                        break;
                    case 'exams':
                        typeClass = 'exams';
                        typeText = '往年试题';
                        break;
                    case 'tips':
                        typeClass = 'tips';
                        typeText = '学习心得';
                        break;
                    case 'course':
                        typeClass = 'notes';
                        typeText = '选课攻略';
                        break;
                }
                
                card.innerHTML = `
                    <span class="resource-type ${typeClass}">${typeText}</span>
                    <div class="resource-title">${resource.title}</div>
                    <div class="resource-desc">${resource.description}</div>
                    <div class="resource-meta">
                        <span>${resource.course}</span>
                        <span>${resource.date}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                        <span style="color: #888; font-size: 0.9em;">上传者: ${resource.uploader} | 下载: ${resource.downloads}次</span>
                        <button class="download-btn" onclick="downloadResource(${resource.id})">下载</button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // 下载资源函数
        function downloadResource(id) {
            const resource = resources.find(r => r.id === id);
            if (resource) {
                alert(`正在下载: ${resource.title}\n感谢您使用资源共享平台！`);
                // 这里可以实现实际的下载逻辑
            }
        }

        // 表单提交事件
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                type: document.getElementById('resourceType').value,
                course: document.getElementById('courseName').value,
                title: document.getElementById('resourceTitle').value,
                description: document.getElementById('description').value
            };
            
            if (!formData.course || !formData.title) {
                alert('请填写必填项：课程名称和资源标题');
                return;
            }
            
            // 添加新资源到列表
            const newResource = {
                id: resources.length + 1,
                type: formData.type,
                title: formData.title,
                description: formData.description,
                course: formData.course,
                uploader: '当前用户',
                date: new Date().toISOString().split('T')[0],
                downloads: 0
            };
            
            resources.unshift(newResource);
            renderResources(resources);
            
            // 重置表单
            document.getElementById('uploadForm').reset();
            alert('资源上传成功！');
        });

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderResources(resources);
            
            // 添加搜索功能
            const searchInput = document.querySelector('.search-bar');
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                const filtered = resources.filter(resource => 
                    resource.title.toLowerCase().includes(searchTerm) ||
                    resource.course.toLowerCase().includes(searchTerm) ||
                    resource.description.toLowerCase().includes(searchTerm)
                );
                renderResources(filtered);
            });
        });
    </script>
</body>
</html>
